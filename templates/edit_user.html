{% extends "base.html" %}

{% block content %}
<div class="dashboard-container">
    <!-- Cabeçalho da Página -->
    <div class="dashboard-header">
        <h1>Editar Usuário</h1>
        <p>Editando informações de {{ user.full_name }}.</p>
    </div>

    <!-- Formulário de Edição -->
    <div class="section-card">
        <h2 class="section-title">Atualização Cadastral</h2>
        <form method="POST" action="{{ url_for('update_user', user_id=user.id) }}">
            <div class="form-group">
                <label for="full_name">Nome Completo:</label>
                <input type="text" id="full_name" name="full_name" value="{{ user.full_name }}" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" name="cpf" value="{{ user.cpf }}" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" value="{{ user.email }}" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="phone">Telefone:</label>
                <input type="text" id="phone" name="phone" value="{{ user.phone }}" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="birth_date">Data de Nascimento:</label>
                <input type="date" id="birth_date" name="birth_date" value="{{ user.birth_date.strftime('%Y-%m-%d') }}" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="address">Endereço:</label>
                <input type="text" id="address" name="address" value="{{ user.address }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirme a Senha</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
            </div>

            <button type="submit" class="btn btn-primary">Salvar Alterações</button>
        </form>
    </div>

    <!-- Botão para Voltar ao Painel Admin -->
    <div class="text-center mt-4">
        <a href="{{ url_for('admin_panel') }}" class="btn btn-secondary">Voltar ao Painel Admin</a>
    </div>
</div>
{% endblock %}
