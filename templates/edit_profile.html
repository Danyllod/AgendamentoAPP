{% extends "base.html" %}
{% block content %}
<div class="dashboard-container">
    <!-- Formulário de Edição -->
    <div class="section-card">
        <h2 class="section-title">Atualização Cadastral</h2>
        <form method="POST" action="{{ url_for('update_profile') }}">
            <div class="form-group">
                <label for="full_name">Nome Completo:</label>
                <input type="text" id="full_name" name="full_name" value="{{ current_user.full_name }}" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" name="cpf" value="{{ current_user.cpf }}" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" value="{{ current_user.email }}" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="phone">Telefone:</label>
                <input type="text" id="phone" name="phone" value="{{ current_user.phone }}" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="birth_date">Data de Nascimento:</label>
                <input type="date" id="birth_date" name="birth_date" value="{{ current_user.birth_date.strftime('%Y-%m-%d') }}" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="address">Endereço:</label>
                <input type="text" id="address" name="address" value="{{ current_user.address }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirme a Senha</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
            </div>


            <button type="submit" class="btn btn-primary">Salvar Alterações</button>
        </form>
    </div>

    <div class="text-center mt-4">
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Voltar</a>
    </div>
</div>
{% endblock %}
