<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Filho - Agendamento Infanto</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div class="container my-4">
    <h1 class="mb-4 text-center">Cadastrar Filho</h1>
    <form method="POST" action="{{ url_for('cadastrar_filho') }}">
      <div class="mb-3">
        <label for="nome_completo" class="form-label">Nome Completo</label>
        <input type="text" class="form-control" id="nome_completo" name="nome_completo" required>
      </div>
      <div class="mb-3">
        <label for="nome_pai" class="form-label">Nome do Pai</label>
        <input type="text" class="form-control" id="nome_pai" name="nome_pai" required>
      </div>
      <div class="mb-3">
        <label for="nome_mae" class="form-label">Nome da Mãe</label>
        <input type="text" class="form-control" id="nome_mae" name="nome_mae" required>
      </div>
      <div class="mb-3">
        <label for="cpf" class="form-label">CPF</label>
        <input type="text" class="form-control" id="cpf" name="cpf" required>
      </div>
      <div class="mb-3">
        <label for="idade" class="form-label">Idade</label>
        <input type="number" class="form-control" id="idade" name="idade" min="0" required>
      </div>
      <div class="mb-3">
        <label for="endereco" class="form-label">Endereço</label>
        <input type="text" class="form-control" id="endereco" name="endereco" required>
      </div>
      <button type="submit" class="btn btn-primary">Cadastrar Filho</button>
      <a href="{{ url_for('painel_filhos') }}" class="btn btn-secondary">Cancelar</a>
    </form>
  </div>
</body>
</html>
